---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tempo-private
  namespace: tempo
  annotations:
    kubernetes.io/ingress.class: traefik-external
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`tempo.local.timmybtech.com`)
      kind: Rule
      services:
        - name: tempo
          port: 3200
      middlewares:
        - name: default-headers
          namespace: traefik
  tls:
    secretName: local-timmybtech-com-tls
