apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations: {}
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.147.1
      chart: opentelemetry-collector
      helm:
        releaseName: opentelemetry-collector
        values: |
          image:
            repository: "otel/opentelemetry-collector-k8s"

          # Base collector configuration.
          # Supports templating. To escape existing instances of {{ }}, use {{` <original content> `}}.
          # For example, {{ REDACTED_EMAIL }} becomes {{` {{ REDACTED_EMAIL }} `}}.
          config:
            exporters:
              debug: {}
              otlp/tempo:
                endpoint: tempo.tempo.svc.cluster.local:4317
                tls:
                  insecure: true
            extensions:
              # The health_check extension is mandatory for this chart.
              # Without the health_check extension the collector will fail the readiness and liveness probes.
              # The health_check extension can be modified, but should never be removed.
              health_check:
                endpoint: ${env:MY_POD_IP}:13133
            processors:
              batch: {}
              # Default memory limiter configuration for the collector based on k8s resource limits.
              memory_limiter:
                # check_interval is the time between measurements of memory usage.
                check_interval: 5s
                # By default limit_mib is set to 80% of ".Values.resources.limits.memory"
                limit_percentage: 80
                # By default spike_limit_mib is set to 25% of ".Values.resources.limits.memory"
                spike_limit_percentage: 25
            receivers:
              jaeger:
                protocols:
                  grpc:
                    endpoint: ${env:MY_POD_IP}:14250
                  thrift_http:
                    endpoint: ${env:MY_POD_IP}:14268
                  thrift_compact:
                    endpoint: ${env:MY_POD_IP}:6831
              otlp:
                protocols:
                  grpc:
                    endpoint: ${env:MY_POD_IP}:4317
                  http:
                    endpoint: ${env:MY_POD_IP}:4318
              # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
              prometheus:
                config:
                  scrape_configs:
                    - job_name: opentelemetry-collector
                      scrape_interval: 10s
                      static_configs:
                        - targets:
                            - ${env:MY_POD_IP}:8888
              zipkin:
                endpoint: ${env:MY_POD_IP}:9411
            service:
              telemetry:
                resource:
                  k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
                  k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
                  k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
                  k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
                  k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
                  host.name: "${env:OTEL_K8S_NODE_NAME}"
                metrics:
                  readers:
                    - pull:
                        exporter:
                          prometheus:
                            host: ${env:MY_POD_IP}
                            port: 8888
              extensions:
                - health_check
              pipelines:
                logs:
                  exporters:
                    - debug
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
                metrics:
                  exporters:
                    - debug
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
                    # if internalTelemetryViaOTLP.metrics.enabled = true, prometheus receiver will be removed
                    - prometheus
                traces:
                  exporters:
                    - debug
                    - otlp/tempo
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
                    - jaeger
                    - zipkin
    - repoURL: "https://github.com/timmyb824/kubernetes-apps.git"
      path: "gitops/manifests/otel-collector"
      targetRevision: HEAD

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
