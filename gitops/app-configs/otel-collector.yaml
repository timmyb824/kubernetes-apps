apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations: {}
spec:
  destination:
    namespace: monitoring
    server: "https://kubernetes.default.svc"
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      targetRevision: 0.150.1
      chart: opentelemetry-collector
      helm:
        releaseName: opentelemetry-collector
        values: |
          image:
            repository: otel/opentelemetry-collector-contrib
          mode: deployment

          ports:
            metrics:
              enabled: true
              containerPort: 8888
              servicePort: 8888
              protocol: TCP
            jaeger-compact:
              enabled: false
            jaeger-grpc:
              enabled: false
            jaeger-thrift:
              enabled: false
            zipkin:
              enabled: false

          config:
            exporters:
              debug: {}
              otlp/tempo:
                endpoint: tempo.monitoring.svc.cluster.local:4317
                tls:
                  insecure: true
              prometheusremotewrite:
                endpoint: http://prometheus-service.monitoring.svc.cluster.local:8080/api/v1/write
                tls:
                  insecure: true
              otlphttp/metrics:
                endpoint: http://prometheus-service.monitoring.svc.cluster.local:8080/api/v1/otlp
                tls:
                  insecure: true
              otlphttp/loki:
                endpoint: http://192.168.86.146:3100/otlp
                tls:
                  insecure: true

            extensions:
              health_check:
                endpoint: ${env:MY_POD_IP}:13133

            processors:
              batch: {}
              memory_limiter:
                check_interval: 5s
                limit_percentage: 80
                spike_limit_percentage: 25

            receivers:
              otlp:
                protocols:
                  grpc:
                    endpoint: ${env:MY_POD_IP}:4317
                  http:
                    endpoint: ${env:MY_POD_IP}:4318
              prometheus:
                config:
                  scrape_configs:
                    - job_name: opentelemetry-collector
                      scrape_interval: 30s
                      static_configs:
                        - targets:
                            - ${env:MY_POD_IP}:8888

            service:
              telemetry:
                resource:
                  k8s.namespace.name: "${env:OTEL_K8S_NAMESPACE}"
                  k8s.node.name: "${env:OTEL_K8S_NODE_NAME}"
                  k8s.node.ip: "${env:OTEL_K8S_NODE_IP}"
                  k8s.pod.name: "${env:OTEL_K8S_POD_NAME}"
                  k8s.pod.ip: "${env:OTEL_K8S_POD_IP}"
                  host.name: "${env:OTEL_K8S_NODE_NAME}"
                metrics:
                  readers:
                    - pull:
                        exporter:
                          prometheus:
                            host: ${env:MY_POD_IP}
                            port: 8888
              extensions:
                - health_check
              pipelines:
                logs:
                  exporters:
                    - debug
                    - otlphttp/loki
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
                metrics:
                  exporters:
                    - debug
                    - prometheusremotewrite
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
                    - prometheus
                traces:
                  exporters:
                    - debug
                    - otlp/tempo
                  processors:
                    - memory_limiter
                    - batch
                  receivers:
                    - otlp
    - repoURL: "https://github.com/timmyb824/kubernetes-apps.git"
      path: "gitops/manifests/otel-collector"
      targetRevision: HEAD

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - ApplyOutOfSyncOnly=true
